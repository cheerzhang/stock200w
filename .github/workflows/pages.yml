name: Deploy GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Stamp deployment version
        run: |
          printf '{"version":"%s"}\n' "$GITHUB_SHA" > deploy-version.json
          sed -i "s|styles.css?v=[^\"]*|styles.css?v=$GITHUB_SHA|" index.html
          sed -i "s|app.js?v=[^\"]*|app.js?v=$GITHUB_SHA|" index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
